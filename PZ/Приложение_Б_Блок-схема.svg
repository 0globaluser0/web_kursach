text>\n<rect class="node" x="450" y="305" width="285" height="56" rx="4" ry="4"/>\n<text x="592.5" y="323.1" text-anchor="middle" dominant-baseline="middle">Ввод email и пароля</text>\n<text x="592.5" y="342.3" text-anchor="middle" dominant-baseline="middle">или регистрация</text>\n<rect class="node" x="450" y="390" width="285" height="56" rx="4" ry="4"/>\n<text x="592.5" y="408.1" text-anchor="middle" dominant-baseline="middle">Запрос состояния</text>\n<text x="592.5" y="427.3" text-anchor="middle" dominant-baseline="middle">через /api/state</text>\n<polygon class="node decision" points="593.0,485 688,525.0 593.0,565 498,525.0"/>\n<text x="593.0" y="515.1" text-anchor="middle" dominant-baseline="middle">Данные</text>\n<text x="593.0" y="534.3" text-anchor="middle" dominant-baseline="middle">корректны?</text>\n<rect class="node" x="450" y="600" width="285" height="56" rx="4" ry="4"/>\n<text x="592.5" y="618.1" text-anchor="middle" dominant-baseline="middle">Сохранение локальной</text>\n<text x="592.5" y="637.3" text-anchor="middle" dominant-baseline="middle">сессии браузера</text>\n<rect class="node" x="60" y="420" width="300" height="56" rx="4" ry="4"/>\n<text x="210.0" y="438.1" text-anchor="middle" dominant-baseline="middle">Открытие</text>\n<text x="210.0" y="457.3" text-anchor="middle" dominant-baseline="middle">dashboard.html</text>\n<rect class="node" x="60" y="505" width="300" height="70" rx="4" ry="4"/>\n<text x="210.0" y="520.2" text-anchor="middle" dominant-baseline="middle">Загрузка рынка, портфеля</text>\n<text x="210.0" y="539.4" text-anchor="middle" dominant-baseline="middle">и истории из SQLite</text>\n<text x="210.0" y="558.6" text-anchor="middle" dominant-baseline="middle">через API</text>\n<rect class="node" x="60" y="610" width="300" height="56" rx="4" ry="4"/>\n<text x="210.0" y="628.1" text-anchor="middle" dominant-baseline="middle">Просмотр рынка</text>\n<text x="210.0" y="647.3" text-anchor="middle" dominant-baseline="middle">и графиков</text>\n<rect class="node" x="60" y="695" width="300" height="56" rx="4" ry="4"/>\n<text x="210.0" y="713.1" text-anchor="middle" dominant-baseline="middle">Запрос свечей</text>\n<text x="210.0" y="732.3" text-anchor="middle" dominant-baseline="middle">через /api/klines</text>\n<polygon class="node decision" points="210.0,790 305,830.0 210.0,870 115,830.0"/>\n<text x="210.0" y="820.1" text-anchor="middle" dominant-baseline="middle">Свечи</text>\n<text x="210.0" y="839.3" text-anchor="middle" dominant-baseline="middle">получены?</text>\n<rect class="node" x="450" y="725" width="285" height="56" rx="4" ry="4"/>\n<text x="592.5" y="743.1" text-anchor="middle" dominant-baseline="middle">Построение</text>\n<text x="592.5" y="762.3" text-anchor="middle" dominant-baseline="middle">TradingView-графика</text>\n<rect class="node" x="450" y="840" width="285" height="70" rx="4" ry="4"/>\n<text x="592.5" y="865.1" text-anchor="middle" dominant-baseline="middle">Построение fallback-графика</text>\n<text x="592.5" y="884.3" text-anchor="middle" dominant-baseline="middle">по price_history</text>\n<rect class="node" x="840" y="790" width="300" height="56" rx="4" ry="4"/>\n<text x="990.0" y="808.1" text-anchor="middle" dominant-baseline="middle">Выбор актива</text>\n<text x="990.0" y="827.3" text-anchor="middle" dominant-baseline="middle">на trade.html</text>\n<rect class="node" x="840" y="880" width="300" height="56" rx="4" ry="4"/>\n<text x="990.0" y="898.1" text-anchor="middle" dominant-baseline="middle">Ввод количества</text>\n<text x="990.0" y="917.3" text-anchor="middle" dominant-baseline="middle">и типа операции</text>\n<polygon class="node decision" points="990.0,980 1085,1025.0 990.0,1070 895,1025.0"/>\n<text x="990.0" y="1015.1" text-anchor="middle" dominant-baseline="middle">Средств или</text>\n<text x="990.0" y="1034.3" text-anchor="middle" dominant-baseline="middle">монет достаточно?</text>\n<rect class="node" x="1225" y="995" width="260" height="56" rx="4" ry="4"/>\n<text x=